<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/eajicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EA Software Solutions</title>

    <!-- SEO Meta Tags -->
    <meta
      name="description"
      content="Custom systems, workflow automation, ERP solutions, and digital innovations built for Filipino businesses and founders. Scale your business and reclaim your time."
    />
    <meta
      name="keywords"
      content="EA Software Solutions, software development philippines, custom ERP philippines, workflow automation, software solutions Manila, operational dashboard development, custom software engineering"
    />
    <meta name="author" content="EA Software Solutions" />
    <link rel="canonical" href="https://eajwebdev.com" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://eajwebdev.com" />
    <meta property="og:title" content="EA Software Solutions" />
    <meta
      property="og:description"
      content="Custom systems, workflow automation, ERP solutions, and digital innovations built for Filipino businesses. Scale your business and reclaim your time."
    />
    <meta property="og:image" content="https://eajwebdev.com/eajicon.png" />
    <meta property="og:site_name" content="EA Software Solutions" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://eajwebdev.com" />
    <meta name="twitter:title" content="EA Software Solutions" />
    <meta
      name="twitter:description"
      content="Custom systems, workflow automation, ERP solutions, and digital innovations built for Filipino businesses."
    />
    <meta
      name="twitter:image"
      content="https://eajwebdev.com/eajicon.png"
    />

    <!-- Structured Data (JSON-LD Schema) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "EA Software Solutions",
        "url": "https://eajwebdev.com",
        "logo": "https://eajwebdev.com/eajicon.png",
        "sameAs": ["https://facebook.com", "https://instagram.com"],
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "info@eajwebdev.com",
          "contactType": "customer service"
        }
      }
    </script>

    <!-- Security Headers -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://formsubmit.co; frame-ancestors 'none';"
    />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta
      http-equiv="Referrer-Policy"
      content="strict-origin-when-cross-origin"
    />
    <meta
      http-equiv="Permissions-Policy"
      content="camera=(), microphone=(), geolocation=()"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
